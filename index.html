<!doctype html>
<html lang="da">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Bella Player</title>
  <style>
    :root {
      --bg: #fff1f8;
      --panel: #ffffff;
      --text: #3b1730;
      --muted: #8a5d7a;
      --accent: #ff7fbc;
      --accent-2: #ffd6ec;
      --border: rgba(91, 38, 75, 0.12);
      --shadow: 0 18px 40px rgba(176, 76, 137, 0.16);
      --radius: 22px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: ui-rounded, "Nunito", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(255, 214, 236, 0.95), transparent 34rem),
        radial-gradient(circle at top right, rgba(255, 240, 250, 0.9), transparent 26rem),
        radial-gradient(circle at bottom right, rgba(255, 127, 188, 0.28), transparent 32rem),
        linear-gradient(135deg, #fff7fb 0%, #ffe8f4 48%, #fff2fb 100%);
    }

    header {
      padding: 22px clamp(16px, 4vw, 42px) 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .brand h1 {
      margin: 0;
      font-size: clamp(1.45rem, 3vw, 2.3rem);
      letter-spacing: -0.04em;
    }

    .brand p {
      margin: 5px 0 0;
      color: var(--muted);
      font-size: 0.98rem;
    }

    .pill {
      padding: 9px 13px;
      border-radius: 999px;
      background: rgba(255,255,255,0.72);
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: 0.9rem;
      white-space: nowrap;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(280px, 360px);
      gap: 20px;
      padding: 14px clamp(16px, 4vw, 42px) 34px;
      align-items: start;
    }

    .player-card,
    .playlist-card {
      background: rgba(255,255,255,0.88);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      backdrop-filter: blur(10px);
    }

    .video-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 9;
      background: #111;
    }

    iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
    }

    .end-screen {
      position: absolute;
      inset: 0;
      display: none;
      place-items: center;
      padding: 22px;
      text-align: center;
      color: white;
      background: linear-gradient(135deg, rgba(59, 23, 48, 0.96), rgba(255, 127, 188, 0.84));
    }

    .end-screen.visible {
      display: grid;
    }

    .end-screen strong {
      display: block;
      margin-bottom: 14px;
      font-size: clamp(1.15rem, 3vw, 1.8rem);
      line-height: 1.2;
    }

    .replay-button {
      appearance: none;
      border: 0;
      border-radius: 999px;
      padding: 11px 17px;
      color: var(--text);
      background: white;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 10px 24px rgba(0,0,0,0.22);
    }

    .video-meta {
      padding: 16px 18px 18px;
    }

    .video-meta h2 {
      margin: 0;
      font-size: clamp(1.15rem, 2vw, 1.55rem);
      letter-spacing: -0.02em;
    }

    .video-meta p {
      margin: 7px 0 0;
      color: var(--muted);
      line-height: 1.45;
    }

    .playlist-card {
      max-height: calc(100vh - 120px);
      display: flex;
      flex-direction: column;
    }

    .playlist-head {
      padding: 15px 15px 11px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
    }

    .playlist-head strong { font-size: 1rem; }
    .playlist-head span { color: var(--muted); font-size: 0.88rem; }

    .video-list {
      overflow-y: auto;
      padding: 10px;
      display: grid;
      gap: 9px;
    }

    .video-button {
      appearance: none;
      border: 1px solid transparent;
      background: transparent;
      width: 100%;
      display: grid;
      grid-template-columns: 112px minmax(0, 1fr);
      gap: 10px;
      align-items: center;
      text-align: left;
      padding: 8px;
      border-radius: 16px;
      cursor: pointer;
      color: inherit;
      transition: transform 120ms ease, background 120ms ease, border 120ms ease;
    }

    .video-button:hover,
    .video-button:focus-visible {
      background: rgba(255, 209, 102, 0.22);
      outline: none;
      transform: translateY(-1px);
    }

    .video-button.active {
      background: rgba(255, 107, 138, 0.13);
      border-color: rgba(255, 107, 138, 0.35);
    }

    .thumb {
      width: 112px;
      aspect-ratio: 16 / 9;
      border-radius: 11px;
      object-fit: cover;
      background: #eee;
      display: block;
    }

    .video-button strong {
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      font-size: 0.95rem;
      line-height: 1.22;
      letter-spacing: -0.01em;
    }

    .video-button small {
      display: block;
      color: var(--muted);
      margin-top: 5px;
      font-size: 0.78rem;
    }

    .empty,
    .error {
      padding: 24px;
      color: var(--muted);
      line-height: 1.5;
    }

    .noscript {
      margin: 0 clamp(16px, 4vw, 42px) 20px;
      padding: 12px 14px;
      border-radius: 12px;
      background: #fff3cd;
      border: 1px solid #ffe08a;
    }

    @media (max-width: 880px) {
      header {
        align-items: flex-start;
        flex-direction: column;
      }

      .layout {
        grid-template-columns: 1fr;
      }

      .playlist-card {
        max-height: none;
      }
    }

    @media (max-width: 520px) {
      .video-button {
        grid-template-columns: 96px minmax(0, 1fr);
      }

      .thumb { width: 96px; }
    }
  </style>
</head>
<body>
  <header>
    <div class="brand">
      <h1>Bella Player</h1>
    </div>
    <div class="pill" id="counter">Indlæser videoer…</div>
  </header>

  <noscript>
    <div class="noscript">Denne side kræver JavaScript for at vise video-listen.</div>
  </noscript>

  <main class="layout">
    <section class="player-card" aria-label="Valgt video">
      <div class="video-wrap">
        <iframe
          id="player"
          title="YouTube videoafspiller"
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
          allowfullscreen
          referrerpolicy="strict-origin-when-cross-origin">
        </iframe>
        <div class="end-screen" id="end-screen" aria-live="polite" aria-hidden="true">
          <div>
            <strong id="end-title">Videoen er slut</strong>
            <button class="replay-button" id="replay-button" type="button">Afspil igen</button>
          </div>
        </div>
      </div>
      <div class="video-meta">
        <h2 id="current-title">Vælg en video</h2>
        <p id="current-help">Klik på en video i listen for at starte den her.</p>
      </div>
    </section>

    <aside class="playlist-card" aria-label="Videoliste">
      <div class="playlist-head">
        <strong>Videoer</strong>
        <span id="playlist-count"></span>
      </div>
      <div class="video-list" id="video-list">
        <div class="empty">Indlæser video-listen…</div>
      </div>
    </aside>
  </main>

  <script>
    const VIDEOS_FILE = "videos.json";
    const listEl = document.getElementById("video-list");
    const playerEl = document.getElementById("player");
    const titleEl = document.getElementById("current-title");
    const helpEl = document.getElementById("current-help");
    const counterEl = document.getElementById("counter");
    const playlistCountEl = document.getElementById("playlist-count");
    const endScreenEl = document.getElementById("end-screen");
    const endTitleEl = document.getElementById("end-title");
    const replayButtonEl = document.getElementById("replay-button");
    let currentVideo = null;
    let currentButton = null;

    function youTubeOrigin() {
      if (location.origin && location.origin !== "null") return { origin: location.origin };
      return {};
    }

    function extractVideoId(value) {
      if (!value) return "";
      const text = String(value).trim();
      if (/^[a-zA-Z0-9_-]{11}$/.test(text)) return text;
      try {
        const url = new URL(text);
        if (url.hostname.includes("youtu.be")) return url.pathname.replace("/", "").slice(0, 11);
        return url.searchParams.get("v") || "";
      } catch {
        return text;
      }
    }

    function thumbUrl(videoId) {
      return `https://img.youtube.com/vi/${videoId}/mqdefault.jpg`;
    }

    function embedUrl(videoId) {
      const params = new URLSearchParams({
        rel: "0",
        modestbranding: "1",
        playsinline: "1",
        enablejsapi: "1",
        ...youTubeOrigin()
      });
      return `https://www.youtube-nocookie.com/embed/${videoId}?${params.toString()}`;
    }

    function hideEndScreen() {
      endScreenEl.classList.remove("visible");
      endScreenEl.setAttribute("aria-hidden", "true");
    }

    function showEndScreen() {
      if (!currentVideo) return;
      endTitleEl.textContent = `${currentVideo.title} er slut`;
      endScreenEl.classList.add("visible");
      endScreenEl.setAttribute("aria-hidden", "false");

      // YouTube cannot fully disable the end-card/recommendation UI for embeds.
      // Blank the iframe as soon as playback ends, so Bella Player shows our own
      // neutral end screen instead of YouTube's related-video grid.
      playerEl.src = "about:blank";
    }

    function normalizeVideos(rawVideos) {
      return rawVideos
        .map((video, index) => {
          const id = extractVideoId(video.id || video.url || video);
          if (!id) return null;
          return {
            id,
            title: video.title || `Video ${index + 1}`,
            note: video.note || ""
          };
        })
        .filter(Boolean);
    }

    function selectVideo(video, button) {
      currentVideo = video;
      currentButton = button;
      hideEndScreen();
      playerEl.src = embedUrl(video.id);
      titleEl.textContent = video.title;
      helpEl.textContent = video.note || "Afspilles sikkert fra den valgte liste.";

      document.querySelectorAll(".video-button.active").forEach((el) => el.classList.remove("active"));
      if (button) button.classList.add("active");
    }

    function setupYouTubeEndDetection() {
      const script = document.createElement("script");
      script.src = "https://www.youtube.com/iframe_api";
      document.head.appendChild(script);

      window.onYouTubeIframeAPIReady = () => {
        new YT.Player("player", {
          events: {
            onStateChange(event) {
              if (event.data === YT.PlayerState.ENDED) showEndScreen();
            }
          }
        });
      };
    }

    replayButtonEl.addEventListener("click", () => {
      if (currentVideo) selectVideo(currentVideo, currentButton);
    });

    function renderVideos(videos) {
      if (!videos.length) {
        listEl.innerHTML = '<div class="empty">Der er ikke tilføjet nogen videoer endnu.</div>';
        counterEl.textContent = "0 videoer";
        playlistCountEl.textContent = "0";
        return;
      }

      counterEl.textContent = `${videos.length} videoer`;
      playlistCountEl.textContent = `${videos.length}`;
      listEl.innerHTML = "";

      videos.forEach((video, index) => {
        const button = document.createElement("button");
        button.className = "video-button";
        button.type = "button";
        button.innerHTML = `
          <img class="thumb" src="${thumbUrl(video.id)}" alt="Thumbnail for ${escapeHtml(video.title)}" loading="lazy">
          <span>
            <strong>${escapeHtml(video.title)}</strong>
            <small>Video ${index + 1}</small>
          </span>
        `;
        button.addEventListener("click", () => selectVideo(video, button));
        listEl.appendChild(button);

        if (index === 0) selectVideo(video, button);
      });
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    async function loadVideos() {
      try {
        const response = await fetch(`${VIDEOS_FILE}?v=${Date.now()}`, { cache: "no-store" });
        if (!response.ok) throw new Error(`Kunne ikke hente ${VIDEOS_FILE}`);
        const rawVideos = await response.json();
        renderVideos(normalizeVideos(rawVideos));
      } catch (error) {
        console.error(error);
        counterEl.textContent = "Fejl";
        listEl.innerHTML = `
          <div class="error">
            Kunne ikke indlæse <strong>${VIDEOS_FILE}</strong>.<br>
            Sørg for at filen ligger i samme mappe som index.html, og at siden køres via en webserver.
          </div>
        `;
      }
    }

    setupYouTubeEndDetection();
    loadVideos();
  </script>
</body>
</html>
